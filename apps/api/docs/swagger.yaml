paths:
  /activities:
    post:
      consumes:
      - application/json
      parameters:
      - description: Activity payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.UpsertActivityRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/response.Envelope'
            - properties:
                data:
                  $ref: '#/definitions/dto.Activity'
              type: object
      security:
      - BearerAuth: []
      summary: Create activity
      tags:
      - activities
  /activities/{id}:
    delete:
      parameters:
      - description: Activity ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
      security:
      - BearerAuth: []
      summary: Delete activity
      tags:
      - activities
    get:
      parameters:
      - description: Activity ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Envelope'
            - properties:
                data:
                  $ref: '#/definitions/dto.Activity'
              type: object
      security:
      - BearerAuth: []
      summary: Get activity by id
      tags:
      - activities
    put:
      consumes:
      - application/json
      parameters:
      - description: Activity ID
        in: path
        name: id
        required: true
        type: string
      - description: Activity payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.UpsertActivityRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
